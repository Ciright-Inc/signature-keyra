# Railway — signaturers.keyra.ie
# Repo: https://github.com/Ciright-Inc/signature-keyra
# Custom domain: signaturers.keyra.ie → this service

[build]
builder = "nixpacks"
# Some build environments keep `node_modules/.cache` locked (EBUSY), which breaks `npm ci`
# because it tries to remove `node_modules` before reinstalling.
# `npm install` is non-destructive and avoids the rmdir step.
buildCommand = "npm install --include=dev --no-audit --no-fund && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
