# Railway — signaturers.keyra.ie
# Repo: https://github.com/Ciright-Inc/signature-keyra
# Custom domain: signaturers.keyra.ie → this service

[build]
builder = "nixpacks"
# Some build environments can keep `node_modules/.cache` locked (EBUSY), making `rm -rf` fail.
# Renaming `node_modules` is more resilient; `npm ci` then recreates a clean tree.
buildCommand = "if [ -d node_modules ]; then mv node_modules \"node_modules.__old__$(date +%s)\" || true; fi; npm ci && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
