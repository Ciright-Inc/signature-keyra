# Railway — signaturers.keyra.ie
# Repo: https://github.com/Ciright-Inc/signature-keyra
# Custom domain: signaturers.keyra.ie → this service

[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
