# Railway — signaturers.keyra.ie
# Repo: https://github.com/Ciright-Inc/signature-keyra
# Custom domain: signaturers.keyra.ie → this service

[build]
builder = "nixpacks"
# `npm ci` expects a clean node_modules; some build environments can leave a locked `.cache`.
# Ensure a clean install to avoid EBUSY rmdir errors.
buildCommand = "rm -rf node_modules node_modules/.cache && npm ci && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
